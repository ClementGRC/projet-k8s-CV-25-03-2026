apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-deployment-CV-25-03-2026
  namespace: dev
  labels:
    app: ecommerce
    env: dev
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ecommerce
  template:
    metadata:
      labels:
        app: ecommerce
        env: dev
        tier: frontend
    spec:
      containers:
        - name: ecommerce-stripe
          image: soso725/rocketecommerce:beta
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5005
          envFrom:
            - configMapRef:
                name: ecommerce-configmap-CV-25-03-2026
            - secretRef:
                name: ecommerce-secret-CV-25-03-2026
          resources:
            requests:
              memory: "256Mi"
              cpu: "0.2"
            limits:
              memory: "512Mi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service-CV-25-03-2026
  namespace: dev
  labels:
    app: ecommerce
    env: dev
spec:
  type: NodePort
  selector:
    app: ecommerce
  ports:
    - port: 5005
      targetPort: 5005
      protocol: TCP
      name: ecommerce-np
