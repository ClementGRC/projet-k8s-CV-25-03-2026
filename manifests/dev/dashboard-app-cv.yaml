apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-deployment-cv
  namespace: dev
  labels:
    app: dashboard
    env: dev
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        env: dev
        tier: frontend
    spec:
      containers:
        - name: dashboard
          image: dashboard-cv:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 5005
          envFrom:
            - configMapRef:
                name: dashboard-configmap-cv
            - secretRef:
                name: dashboard-secret-cv
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service-cv
  namespace: dev
  labels:
    app: dashboard
    env: dev
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 5005
      targetPort: 5005
      protocol: TCP
      name: dashboard-np
