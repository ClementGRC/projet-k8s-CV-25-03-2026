apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-pro-deployment-cv
  namespace: dev
  labels:
    app: django-pro
    env: dev
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: django-pro
  template:
    metadata:
      labels:
        app: django-pro
        env: dev
        tier: frontend
    spec:
      containers:
        - name: django-pro
          image: clemgrc/django-pro-cv:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5005
          envFrom:
            - configMapRef:
                name: django-pro-configmap-cv
            - secretRef:
                name: django-pro-secret-cv
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: django-pro-service-cv
  namespace: dev
  labels:
    app: django-pro
    env: dev
spec:
  type: NodePort
  selector:
    app: django-pro
  ports:
    - port: 5005
      targetPort: 5005
      protocol: TCP
      name: django-pro-np
